# Additional wizard spells inspired by high-magic fantasy concepts.

- type: entity
  id: ActionMeteorSwarm
  parent: ActionFireballIII
  name: Meteor Swarm
  description: Unleash a devastating explosive blast at your target location.
  components:
  - type: Magic
  - type: WorldTargetAction
    useDelay: 22
    renewCharges: true
    itemIconStyle: BigAction
    checkCanAccess: false
    raiseOnUser: true
    range: 60
    sound: !type:SoundPathSpecifier
      path: /Audio/Magic/fireball.ogg
    icon:
      sprite: Objects/Magic/magicactions.rsi
      state: fireball
    event: !type:ProjectileSpellEvent
      prototype: ProjectileFireball
      speech: action-speech-spell-fireball

- type: entity
  id: ActionTimeStopPlaceholder
  parent: ActionSmoke
  name: Time Stop
  description: Freeze the battlefield by obscuring and disrupting enemy movement.
  components:
  - type: Magic
  - type: InstantAction
    useDelay: 35
    itemIconStyle: BigAction
    icon:
      sprite: Actions/smokeaction.rsi
      state: smokeaction
    event: !type:InstantSpawnSpellEvent
      prototype: WizardSmoke
      posData: !type:TargetInFront

- type: entity
  id: ActionChainLightningPlaceholder
  parent: ActionRepulse
  name: Chain Lightning
  description: Blast nearby enemies with crackling arcane force.
  components:
  - type: Magic
  - type: RepulseAttract
    speed: 14
    range: 7
    whitelist:
      components:
      - MobMover
      - Item
  - type: InstantAction
    useDelay: 18
    raiseOnAction: true
    itemIconStyle: BigAction
    icon:
      sprite: Objects/Magic/magicactions.rsi
      state: repulse
    event: !type:RepulseAttractActionEvent

- type: entity
  id: ActionGreaterRecharge
  parent: ActionChargeSpell
  name: Greater Recharge
  description: Flood your arcane focus with power and restore extra charges.
  components:
  - type: Magic
  - type: InstantAction
    useDelay: 40
    itemIconStyle: BigAction
    icon:
      sprite: Objects/Weapons/Guns/Basic/wands.rsi
      state: nothing
    event: !type:ChargeSpellEvent
      charge: 2
      speech: DI'RI CEL!

- type: entity
  id: ActionArcaneBulwark
  parent: ActionForceWall
  name: Arcane Bulwark
  description: Conjure reinforced walls of force to block enemy advances.
  components:
  - type: Magic
  - type: InstantAction
    useDelay: 15
    itemIconStyle: BigAction
    sound: !type:SoundPathSpecifier
      path: /Audio/Magic/forcewall.ogg
    icon:
      sprite: Objects/Magic/magicactions.rsi
      state: shield
    event: !type:InstantSpawnSpellEvent
      prototype: WallForce
      posData: !type:TargetInFront
      speech: action-speech-spell-forcewall
